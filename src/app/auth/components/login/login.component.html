<div class="login-container">
  <!-- Subtle background -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="login-wrapper">
    <main class="form-panel" role="main">
      <header class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </header>

      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        novalidate
        class="login-form"
      >
        <!-- ── Email ── -->
        <div
          class="field"
          [class.field--error]="
            loginForm.get('email')?.invalid && loginForm.get('email')?.touched
          "
        >
          <label for="email" class="field-label">
            Email Address <span class="req-star" aria-hidden="true">*</span>
          </label>
          <div class="input-wrap">
            <svg
              class="input-ico"
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              aria-hidden="true"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m2 7 10 7 10-7" />
            </svg>
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              placeholder="jane@example.com"
              class="field-input field-input--icon"
              autocomplete="email"
              aria-required="true"
              [attr.aria-invalid]="
                (loginForm.get('email')?.invalid &&
                  loginForm.get('email')?.touched) ||
                null
              "
              aria-describedby="err-email"
            />
          </div>
          <span
            id="err-email"
            class="field-error"
            role="alert"
            *ngIf="
              loginForm.get('email')?.invalid && loginForm.get('email')?.touched
            "
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Please enter a valid email address
          </span>
        </div>

        <!-- ── Password ── -->
        <div
          class="field"
          [class.field--error]="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
        >
          <div class="label-row">
            <label for="password" class="field-label">
              Password <span class="req-star" aria-hidden="true">*</span>
            </label>
            <a routerLink="/auth/forgot-password" class="forgot-link"
              >Forgot password?</a
            >
          </div>
          <p-password
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            [toggleMask]="true"
            [feedback]="false"
            [inputStyleClass]="'field-input'"
            [style]="{ width: '100%' }"
            aria-required="true"
            aria-describedby="err-password"
          ></p-password>
          <span
            id="err-password"
            class="field-error"
            role="alert"
            *ngIf="
              loginForm.get('password')?.invalid &&
              loginForm.get('password')?.touched
            "
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Password must be at least 6 characters
          </span>
        </div>

        <!-- ── Resend verification ── -->
        <div class="resend-block" *ngIf="showResendEmail">
          <p class="resend-text">Didn't receive the verification email?</p>
          <button
            type="button"
            class="resend-btn"
            (click)="resendConfirmation()"
            [disabled]="loading || sendingEmail"
          >
            <svg
              *ngIf="sendingEmail"
              class="spin"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="2.5"
                fill="none"
                stroke-dasharray="31.4"
                stroke-dashoffset="8"
              />
            </svg>
            {{ sendingEmail ? "Sending…" : "Resend Verification Email" }}
          </button>
        </div>

        <!-- ── Submit ── -->
        <div class="form-footer">
          <button
            type="submit"
            class="submit-btn"
            [disabled]="loginForm.invalid || loading"
            [attr.aria-busy]="loading ? 'true' : null"
          >
            <svg
              *ngIf="loading"
              class="spin"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="white"
                stroke-width="2.5"
                fill="none"
                stroke-dasharray="31.4"
                stroke-dashoffset="8"
              />
            </svg>
            <span>{{ loading ? "Signing in…" : "Sign In" }}</span>
            <svg
              *ngIf="!loading"
              class="btn-arrow"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </button>

          <p class="signup-prompt">
            Don't have an account?
            <a routerLink="/auth/register" class="signup-link">Sign up here</a>
          </p>
        </div>
      </form>
    </main>
  </div>

  <p-toast></p-toast>
</div>
